<mat-form-field appearance="outline">
    <mat-label>Tema</mat-label>
    <mat-select [value]="theme()" (selectionChange)="changeTheme($event.value)">
        <mat-select-trigger>
            <mat-icon> {{theme() === "light" ? "light_mode": "dark_mode"}}</mat-icon>
            {{theme() === "light" ?"Ljust tema": "Mörkt tema"}}
        </mat-select-trigger>
        <mat-option value="light">Ljust tema
            <mat-icon>light_mode</mat-icon>
        </mat-option>
        <mat-option value="dark">Mörkt tema
            <mat-icon>dark_mode</mat-icon>
        </mat-option>
    </mat-select>
</mat-form-field>
