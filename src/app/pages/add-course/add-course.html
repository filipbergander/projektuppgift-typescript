<!-- Använder Angular Material UI för att skapa tabellen -->
<div class="table-container">
    <h2>Mitt ramschema</h2>
    <!-- Tabell med kurser inhämtade från service -->
    <div class="mat-elevation-z8">
        <table mat-table [dataSource]="dataSource" matSort>

            <!-- Kurskod -->
            <ng-container matColumnDef="courseCode">
                <th mat-header-cell *matHeaderCellDef mat-sort-header> Kurskod </th>
                <td mat-cell *matCellDef="let row"> {{row.courseCode}} </td>
            </ng-container>

            <!-- Kursnamn -->
            <ng-container matColumnDef="courseName">
                <th mat-header-cell *matHeaderCellDef mat-sort-header> Kursnamn </th>
                <td mat-cell *matCellDef="let row"> {{row.courseName}} </td>
            </ng-container>

            <!-- Högskolepoäng -->
            <ng-container matColumnDef="points">
                <th mat-header-cell *matHeaderCellDef mat-sort-header> Poäng </th>
                <td mat-cell *matCellDef="let row"> {{row.points}} </td>
            </ng-container>

            <!-- Ämne -->
            <ng-container matColumnDef="subject">
                <th mat-header-cell *matHeaderCellDef mat-sort-header> Ämne </th>
                <td mat-cell *matCellDef="let row"> {{row.subject}} </td>
            </ng-container>

            <!-- Kursplan med ikon -->
            <ng-container matColumnDef="syllabus">
                <th mat-header-cell *matHeaderCellDef> Kursplan </th>
                <td mat-cell *matCellDef="let row">
                    <a href="{{row.syllabus}}" class="course-plan-row" aria-label="Länk till kursplan" target="_blank">
                        <mat-icon>
                            link
                        </mat-icon>
                    </a>
                </td>
            </ng-container>

            <!--Knapp för att ta bort kursen i ramschemat-->
            <ng-container matColumnDef="removed">
                <th mat-header-cell *matHeaderCellDef>Radera</th>
                <td mat-cell *matCellDef="let row"><button class="remove-course-btn" id="{{row.courseCode}}" [class.clicked]="row.removed" [disabled]="row.removed" mat-button (click)="deleteCourseFromPlan(row.courseCode)">Ta bort</button></td>
            </ng-container>

            <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
            <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>

        </table>
    </div>
</div>
