<!-- Använder Angular Material UI för att skapa tabellen -->
<div class="table-container">
    <!-- Inputfält för att söka efter kurser eller filtrera -->
    <div class="filter-field">
        <mat-form-field>
            <mat-label>Filtrera kurser</mat-label>
            <input matInput (keyup)="applyFilter($event)" placeholder="Sök kurs..." #input>
        </mat-form-field>

        <!-- Dropdown-meny-->
        <mat-form-field class="dropdown-menu">
            <mat-label>Ämne:</mat-label>
            <mat-select [(ngModel)]="selected" (selectionChange)="filterSubject()">
                <mat-option value="">Alla</mat-option>
                <!-- Filtrera bland varje ämne som finns i den inhämtade datan -->
                @for (subject of subjects; track subject) {
                <mat-option [value]="subject">{{subject}}</mat-option>
                }
            </mat-select>
        </mat-form-field>
    </div>


    <!-- Tabell med kurser inhämtade från service -->
    <div class="mat-elevation-z8">
        <table mat-table [dataSource]="dataSource" matSort>

            <!-- Kurskod -->
            <ng-container matColumnDef="courseCode">
                <th mat-header-cell *matHeaderCellDef mat-sort-header> Kurskod </th>
                <td mat-cell *matCellDef="let row"> {{row.courseCode}} </td>
            </ng-container>

            <!-- Kursnamn -->
            <ng-container matColumnDef="courseName">
                <th mat-header-cell *matHeaderCellDef mat-sort-header> Kursnamn </th>
                <td mat-cell *matCellDef="let row"> {{row.courseName}} </td>
            </ng-container>

            <!-- Högskolepoäng -->
            <ng-container matColumnDef="points">
                <th mat-header-cell *matHeaderCellDef mat-sort-header> Poäng </th>
                <td mat-cell *matCellDef="let row"> {{row.points}} </td>
            </ng-container>

            <!-- Ämne -->
            <ng-container matColumnDef="subject">
                <th mat-header-cell *matHeaderCellDef mat-sort-header> Ämne </th>
                <td mat-cell *matCellDef="let row"> {{row.subject}} </td>
            </ng-container>

            <!-- Kursplan med ikon -->
            <ng-container matColumnDef="syllabus">
                <th mat-header-cell *matHeaderCellDef> Kursplan </th>
                <td mat-cell *matCellDef="let row">
                    <a href="{{row.syllabus}}" class="course-plan-row" aria-label="Länk till kursplan" target="_blank">
                        <mat-icon>
                            link
                        </mat-icon>
                    </a>
                </td>
            </ng-container>
            <!--Knapp för att lägga till kursen i ramschemat genom localStorage, ändrar knappens text beroende på om tillhörande kurs är tillagd-->
            <ng-container matColumnDef="add">
                <th mat-header-cell *matHeaderCellDef>Val</th>
                <td mat-cell *matCellDef="let row"><button class="add-course-btn" id="{{row.courseCode}}" [class.clicked]="row.added" [disabled]="row.added" mat-button (click)="addCourseToPlan(row)">{{row.added
                        ? "Lagt till" : "Lägg till" }}</button></td>
            </ng-container>

            <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
            <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>

            <!-- När ingen kurs matchar sökning visas detta här -->
            <tr class="mat-row" *matNoDataRow>
                <td class="mat-cell" colspan="4">Ingen kurs matchar din sökning "{{input.value}}"</td>
            </tr>
        </table>
        <!-- Paginering istället för att ha allt i en lång lista och sida, och möjlighet att välja antal kurser som visas på varje sida -->
        <mat-paginator [pageSizeOptions]="[5, 10, 25, 50, 100]" showFirstLastButtons aria-label="Select page of users"></mat-paginator>
    </div>
</div>
